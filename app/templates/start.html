dragElement(document.getElementById("help"));

let fallSpeed = 0;
let g = 0;

function dragElement(s) {
  var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
  if (document.getElementById(s.id + "header")) {
    document.getElementById(s.id + "header").onmousedown = dragMouseDown;
  } else {
    s.onmousedown = dragMouseDown;
  }

  function dragMouseDown(e) {
    fallSpeed = 0;
    g = 0;
    e = e || window.event;
    e.preventDefault();
    // get the mouse cursor position at startup:
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    // call a function whenever the cursor moves:
    document.onmousemove = elementDrag;
  }

  function elementDrag(e) {
    e = e || window.event;
    e.preventDefault();
    // calculate the new cursor position:
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;
    // set the element's new position:
    s.style.top = (s.offsetTop - pos2) + "px";
    s.style.left = (s.offsetLeft - pos1) + "px";
  }

  function closeDragElement() {
    // stop moving when mouse button is released:
    fallSpeed = 1;
    g = 0.2;
    document.onmouseup = null;
    document.onmousemove = null;
  }
}

const element   = document.querySelector("#help");

        fallSpeed = -fallSpeed * bounceLoss;
    }

requestAnimationFrame(tick);
}
